name: Demo Deploy
on:
  workflow_dispatch:
  workflow_run:
    workflows: [Docker Edge Publish]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    # Run only if Docker publish was successful or it is a manual workflow deployment.
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Wait for Docker Edge image to be updated in registry
        run: sleep 45s
        shell: bash

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          experimental: true
          install: true
          install_args: flyctl
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - run: mise run //:deploy:demo
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
